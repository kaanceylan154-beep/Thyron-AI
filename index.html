<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thyron AI — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e8e5e0;
    --text: #1a1916;
    --muted: #9b9690;
    --accent: #2a2825;
    --user-bubble: #1a1916;
    --ai-bubble: #ffffff;
    --send: #1a1916;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* --- HEADER --- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo span {
    font-style: italic;
    color: var(--muted);
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #5cb85c;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* --- CHAT AREA --- */
  .chat-wrapper {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    scroll-behavior: smooth;
  }

  .chat-wrapper::-webkit-scrollbar { width: 4px; }
  .chat-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .messages {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* --- WELCOME STATE --- */
  .welcome {
    text-align: center;
    padding: 60px 0 20px;
    animation: fadeUp 0.5s ease both;
  }

  .welcome h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 48px);
    font-weight: 400;
    line-height: 1.15;
    margin-bottom: 14px;
    letter-spacing: -0.5px;
  }

  .welcome h1 em {
    font-style: italic;
    color: var(--muted);
  }

  .welcome p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 380px;
    margin: 0 auto 36px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .suggestion-btn {
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }

  .suggestion-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  /* --- MESSAGES --- */
  .message {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
    margin-top: 2px;
  }

  .message.ai .avatar {
    background: var(--accent);
    color: #fff;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
  }

  .message.user .avatar {
    background: var(--border);
    color: var(--text);
  }

  .bubble {
    max-width: 82%;
    padding: 13px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.65;
    font-weight: 300;
  }

  .message.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }

  .message.user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-top-right-radius: 4px;
  }

  /* --- TYPING INDICATOR --- */
  .typing-indicator {
    display: none;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-top-left-radius: 4px;
    width: fit-content;
  }

  .typing-indicator.show { display: flex; }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* --- INPUT AREA --- */
  .input-area {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-container {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }

  .input-container:focus-within {
    border-color: var(--accent);
  }

  textarea {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    font-weight: 300;
    color: var(--text);
    resize: none;
    outline: none;
    max-height: 140px;
    line-height: 1.6;
    padding: 4px 0;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: var(--send);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s, transform 0.15s;
  }

  .send-btn:hover { opacity: 0.8; transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .send-btn svg { width: 16px; height: 16px; }

  .footer-note {
    text-align: center;
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 10px;
    font-weight: 300;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Thyron <span>AI</span></div>
  <div class="status"><div class="dot"></div> Online</div>
</header>

<div class="chat-wrapper" id="chatWrapper">
  <div class="messages" id="messages">

    <div class="welcome" id="welcome">
      <h1>Hello, I'm <em>Thyron AI.</em><br>How can I help?</h1>
      <p>Ask me anything — I'm here to think with you, answer questions, and help you get things done.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Explain something complex</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Help me write something</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Brainstorm ideas</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">Answer a question</button>
      </div>
    </div>

  </div>
</div>

<div class="input-area">
  <div class="input-container">
    <textarea
      id="userInput"
      placeholder="Message Thyron AI…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
  <p class="footer-note">Thyron AI can make mistakes. Consider verifying important info.</p>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const chatWrapper = document.getElementById('chatWrapper');
  const welcomeEl = document.getElementById('welcome');

  let conversationHistory = [];
  let isLoading = false;

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = inputEl.value.trim() === '' || isLoading;
  });

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    autoResize(inputEl);
    sendBtn.disabled = false;
    sendMessage();
  }

  function addMessage(role, text) {
    if (welcomeEl) welcomeEl.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'ai' ? 'A' : 'Y';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    if (welcomeEl) welcomeEl.style.display = 'none';
    const wrap = document.createElement('div');
    wrap.className = 'message ai';
    wrap.id = 'typing-wrap';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'A';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator show';
    indicator.innerHTML = '<span></span><span></span><span></span>';

    wrap.appendChild(avatar);
    wrap.appendChild(indicator);
    messagesEl.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-wrap');
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatWrapper.scrollTop = chatWrapper.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: "You are Thyron AI, a warm, thoughtful, and concise AI assistant. Be helpful and direct. Keep responses clear and conversational — not too long unless the question requires depth.",
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.content?.map(b => b.text || '').join('') || "Sorry, I couldn't get a response. Please try again.";
      conversationHistory.push({ role: 'assistant', content: reply });
      addMessage('ai', reply);

    } catch (err) {
      removeTyping();
      addMessage('ai', 'Something went wrong. Please check your connection and try again.');
    }

    isLoading = false;
    sendBtn.disabled = inputEl.value.trim() === '';
    inputEl.focus();
  }
</script>
</body>
</html>
